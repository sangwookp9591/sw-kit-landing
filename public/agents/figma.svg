<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16">
<!-- Figma: Cat designer pixel art - pink/magenta, beret, creative -->
<!-- Beret -->
<rect x="3" y="0" width="8" height="1" fill="#be185d"/>
<rect x="2" y="1" width="12" height="1" fill="#ec4899"/>
<rect x="7" y="0" width="1" height="1" fill="#f9a8d4"/>
<!-- Ears -->
<rect x="3" y="2" width="2" height="1" fill="#f472b6"/>
<rect x="11" y="2" width="2" height="1" fill="#f472b6"/>
<!-- Face -->
<rect x="4" y="2" width="8" height="1" fill="#fcd9b6"/>
<rect x="3" y="3" width="10" height="1" fill="#fcd9b6"/>
<rect x="3" y="4" width="10" height="1" fill="#fcd9b6"/>
<!-- Eyes -->
<rect x="5" y="4" width="1" height="1" fill="#fff"/>
<rect x="6" y="4" width="1" height="1" fill="#be185d"/>
<rect x="9" y="4" width="1" height="1" fill="#fff"/>
<rect x="10" y="4" width="1" height="1" fill="#be185d"/>
<rect x="3" y="5" width="10" height="1" fill="#fcd9b6"/>
<!-- Whiskers -->
<rect x="1" y="5" width="2" height="1" fill="#f9a8d4"/>
<rect x="13" y="5" width="2" height="1" fill="#f9a8d4"/>
<!-- Nose & mouth -->
<rect x="7" y="5" width="2" height="1" fill="#fca5a5"/>
<rect x="3" y="6" width="10" height="1" fill="#fcd9b6"/>
<rect x="6" y="6" width="1" height="1" fill="#fca5a5"/>
<rect x="9" y="6" width="1" height="1" fill="#fca5a5"/>
<rect x="4" y="7" width="8" height="1" fill="#fcd9b6"/>
<rect x="5" y="8" width="6" height="1" fill="#fcd9b6"/>
<!-- Body - Figma colors -->
<rect x="3" y="9" width="10" height="1" fill="#ec4899"/>
<rect x="7" y="9" width="2" height="1" fill="#a855f7"/>
<rect x="3" y="10" width="10" height="2" fill="#db2777"/>
<rect x="6" y="10" width="1" height="1" fill="#a855f7"/>
<rect x="9" y="10" width="1" height="1" fill="#38bdf8"/>
<rect x="4" y="12" width="3" height="2" fill="#fcd9b6"/>
<rect x="9" y="12" width="3" height="2" fill="#fcd9b6"/>
</svg>
