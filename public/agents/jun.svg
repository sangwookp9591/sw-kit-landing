<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16">
<!-- Jun: 평범한 동양인 남성, 짧은 검은 머리, 주황 셔츠 (성능 담당) -->
<!-- Hair - short black -->
<rect x="4" y="0" width="8" height="1" fill="#1a1a2e"/>
<rect x="3" y="1" width="10" height="1" fill="#1a1a2e"/>
<rect x="3" y="2" width="10" height="1" fill="#1a1a2e"/>
<!-- Face -->
<rect x="3" y="3" width="10" height="1" fill="#f0c8a0"/>
<rect x="3" y="4" width="10" height="1" fill="#f0c8a0"/>
<!-- Eyes - dark brown -->
<rect x="5" y="4" width="1" height="1" fill="#fff"/>
<rect x="6" y="4" width="1" height="1" fill="#27272a"/>
<rect x="9" y="4" width="1" height="1" fill="#fff"/>
<rect x="10" y="4" width="1" height="1" fill="#27272a"/>
<!-- Cheeks -->
<rect x="4" y="5" width="1" height="1" fill="#fca5a5"/>
<rect x="11" y="5" width="1" height="1" fill="#fca5a5"/>
<!-- Lower face -->
<rect x="3" y="5" width="10" height="1" fill="#f0c8a0"/>
<rect x="4" y="6" width="8" height="1" fill="#f0c8a0"/>
<!-- Mouth - slight smile -->
<rect x="6" y="6" width="4" height="1" fill="#e8a888"/>
<!-- Neck -->
<rect x="6" y="7" width="4" height="1" fill="#f0c8a0"/>
<!-- Shirt - orange (성능=속도=주황) -->
<rect x="3" y="8" width="10" height="1" fill="#f97316"/>
<rect x="3" y="9" width="10" height="2" fill="#ea580c"/>
<rect x="7" y="8" width="2" height="1" fill="#c2410c"/>
<!-- Legs -->
<rect x="4" y="11" width="3" height="2" fill="#374151"/>
<rect x="9" y="11" width="3" height="2" fill="#374151"/>
</svg>
