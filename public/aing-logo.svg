<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="aing-pipe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90B8"/>
      <stop offset="100%" stop-color="#7EC8E3"/>
    </linearGradient>
    <filter id="aing-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#1A2744"/>

  <!-- S-pipeline path (shadow) -->
  <path d="M126 168 H344 V256 H168 V344 H386"
        stroke="#000" stroke-width="44" stroke-opacity="0.15"
        stroke-linecap="round" stroke-linejoin="round" fill="none"
        transform="translate(3,5)"/>

  <!-- S-pipeline path (main) -->
  <path d="M126 168 H344 V256 H168 V344 H386"
        stroke="url(#aing-pipe)" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round" fill="none"
        filter="url(#aing-glow)"/>

  <!-- Start node (plan) -->
  <circle cx="126" cy="168" r="30" fill="#4A90B8"/>
  <circle cx="126" cy="168" r="14" fill="#1A2744"/>
  <circle cx="126" cy="168" r="7" fill="#4A90B8" opacity="0.8"/>

  <!-- Corner node top-right (exec) — on path bend (344,256) -->
  <circle cx="344" cy="256" r="12" fill="#7EC8E3" opacity="0.8"/>

  <!-- Corner node mid-left (verify) — on path bend (168,256) -->
  <circle cx="168" cy="256" r="10" fill="#7EC8E3" opacity="0.6"/>

  <!-- End node (complete) -->
  <circle cx="386" cy="344" r="30" fill="#4A90B8"/>
  <circle cx="386" cy="344" r="14" fill="#1A2744"/>
  <circle cx="386" cy="344" r="7" fill="#4A90B8" opacity="0.8"/>

  <!-- Agent indicators on pipeline path -->
  <rect x="208" y="157" width="14" height="14" rx="3" fill="#4A90B8" opacity="0.6"/>
  <rect x="282" y="157" width="14" height="14" rx="3" fill="#4A90B8" opacity="0.6"/>
  <rect x="232" y="333" width="14" height="14" rx="3" fill="#4A90B8" opacity="0.6"/>
  <rect x="310" y="333" width="14" height="14" rx="3" fill="#4A90B8" opacity="0.6"/>
</svg>
